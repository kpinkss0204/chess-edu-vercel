<!-- 떠다니는 체스 말 배경 -->
<div class="floating-pieces" id="floating-pieces"></div>

<!-- ══════════════════════════════════ AUTH ══════════════════════════════════ -->
<div id="auth-container">
  <div class="logo-area">
    <div class="logo-icon">♟</div>
    <div class="logo-title">Chess Analysis</div>
    <div class="logo-sub">Powered by Stockfish 18</div>
  </div>

  <!-- 탭 -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-login"  onclick="switchTab('login')">로그인</button>
    <button class="tab-btn"        id="tab-signup" onclick="switchTab('signup')">회원가입</button>
  </div>

  <!-- ── 로그인 폼 ── -->
  <div class="auth-card" id="card-login">
    <div class="msg error  hidden" id="login-error"></div>
    <div class="msg success hidden" id="login-success"></div>

    <div class="field">
      <label>이메일</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
        <input type="email" id="login-email" placeholder="example@email.com"
               onkeydown="if(event.key==='Enter')handleLogin()">
      </div>
    </div>

    <div class="field">
      <label>비밀번호</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="login-password" placeholder="••••••••"
               onkeydown="if(event.key==='Enter')handleLogin()">
        <button class="toggle-pw" onclick="togglePw('login-password',this)" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-primary" id="login-btn" onclick="handleLogin()">
      <span class="btn-text">로그인 <span class="btn-chess-piece">♙</span></span>
      <div class="btn-spinner"></div>
    </button>

    <div class="divider">또는</div>

    <button class="btn-google" onclick="handleGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Google로 계속하기
    </button>
  </div>

  <!-- ── 회원가입 폼 ── -->
  <div class="auth-card hidden" id="card-signup">
    <div class="msg error  hidden" id="signup-error"></div>
    <div class="msg success hidden" id="signup-success"></div>

    <div class="field">
      <label>닉네임</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <input type="text" id="signup-name" placeholder="체스 닉네임">
      </div>
    </div>

    <div class="field">
      <label>이메일</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
        <input type="email" id="signup-email" placeholder="example@email.com">
      </div>
    </div>

    <div class="field">
      <label>비밀번호</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="signup-password" placeholder="6자 이상">
        <button class="toggle-pw" onclick="togglePw('signup-password',this)" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="field">
      <label>비밀번호 확인</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="signup-confirm" placeholder="비밀번호 재입력"
               onkeydown="if(event.key==='Enter')handleSignup()">
        <button class="toggle-pw" onclick="togglePw('signup-confirm',this)" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-primary" id="signup-btn" onclick="handleSignup()">
      <span class="btn-text">계정 만들기 <span class="btn-chess-piece">♙</span></span>
      <div class="btn-spinner"></div>
    </button>

    <div class="divider">또는</div>

    <button class="btn-google" onclick="handleGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Google로 계속하기
    </button>
  </div>

  <!-- ── 이메일 인증 안내 ── -->
  <div class="auth-card hidden" id="card-verify">
    <div class="msg success" id="verify-success">인증 이메일이 발송되었습니다. 이메일을 확인해주세요.</div>
    <div class="msg error hidden" id="verify-error"></div>
    
    <div style="text-align: center; margin-bottom: 24px;">
      <div style="font-size: 48px; margin-bottom: 16px;">📧</div>
      <h3 style="font-family: var(--font-display); font-size: 1.4rem; margin-bottom: 8px;">이메일 인증이 필요합니다</h3>
      <p style="color: var(--text-secondary); font-size: 0.9rem; line-height: 1.5;">
        보안을 위해 이메일 인증을 완료해야 서비스를 이용하실 수 있습니다.<br>
        수신함(또는 스팸함)을 확인해주세요.
      </p>
    </div>

    <button class="btn-primary" id="verify-refresh-btn" onclick="handleRefreshAuth()">
      <span class="btn-text">인증 완료 확인 <span class="btn-chess-piece">♔</span></span>
      <div class="btn-spinner"></div>
    </button>

    <div class="divider">또는</div>

    <button class="btn-google" id="resend-btn" onclick="handleResendVerification()">
      인증 메일 재발송
    </button>

    <button class="btn-logout" onclick="handleLogout()" style="margin-top: 12px; width: 100%; justify-content: center;">
      다른 계정으로 로그인
    </button>
  </div>
</div>

<!-- ══════════════════════════════════ USER PANEL ══════════════════════════════════ -->
<div id="user-panel" class="hidden">
  <div class="logo-area" style="margin-bottom: 24px;">
    <div class="logo-icon">♟</div>
    <div class="logo-title">Chess Analysis</div>
  </div>

  <div class="profile-card">
    <div class="avatar" id="user-avatar-letter">?</div>
    <div class="profile-name" id="user-name">—</div>
    <div class="profile-email" id="user-email">—</div>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-val" id="user-rating">—</div>
        <div class="stat-lbl">레이팅</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="user-games">—</div>
        <div class="stat-lbl">게임 수</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="user-joined">—</div>
        <div class="stat-lbl">가입일</div>
      </div>
    </div>

    <a href="/" class="go-to-chess">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
      체스 분석 시작하기
    </a>

    <button class="btn-logout" onclick="handleLogout()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      로그아웃
    </button>
  </div>
</div>
