  <nav id="sidebar"></nav>

<div id="main">
    <div id="list-panel">
      <div class="list-header">
        <div class="list-title">기보 기록</div>
        <div class="list-sub" id="list-sub">불러오는 중...</div>
        <div class="list-tab-row">
          <button type="button" class="list-tab-btn active" id="tab-records-btn" onclick="switchTab('records')">기보 목록</button>
          <button type="button" class="list-tab-btn" id="tab-stats-btn" onclick="switchTab('stats')">통계 분석</button>
        </div>
      </div>
      <div id="records-list">
        <div class="empty-state">
          <div class="empty-icon">♟</div>
          <div>기록을 불러오는 중입니다...</div>
        </div>
      </div>
    </div>

    <div id="stats-panel">
      <div class="stats-header">
        <div style="flex:1;">
          <div class="stats-title">게임 통계</div>
          <div class="stats-sub" id="stats-sub">분석 중...</div>
        </div>
        <button type="button" class="ai-stats-btn" id="btn-ai-stats" onclick="requestAIFeedback()">
          <span class="ai-icon">✨</span> AI 통계 분석 받기
        </button>
      </div>
      <div id="stats-content">
        <div class="stats-loading">
          <div class="stats-spinner"></div>
          <div>Stockfish 초기화 중...</div>
        </div>
      </div>
      
      <!-- AI 피드백 영역 -->
      <div id="ai-feedback-container" style="display:none;">
        <div class="ai-feedback-card">
          <div class="ai-feedback-head">
            <div class="ai-feedback-title">🤖 AI 성과 리포트</div>
            <button class="ai-feedback-close" onclick="closeAIFeedback()">✕</button>
          </div>
          <div id="ai-feedback-body" class="ai-feedback-content">
            <!-- AI 응답이 여기에 렌더링됨 -->
          </div>
        </div>
      </div>
    </div>

    <div id="viewer-panel">
      <div id="viewer-empty">
        <div class="viewer-empty-icon">♜</div>
        <div class="viewer-empty-text">왼쪽에서 게임을 선택하세요</div>
      </div>
      <div id="viewer-container">
        <div class="viewer-player-bar" style="max-width:880px;width:100%;">
          <div class="vp-info">
            <div class="vp-avatar" id="vp-opp-avatar">?</div>
            <div>
              <div class="vp-name" id="vp-opp-name">상대방</div>
              <div class="vp-color" id="vp-opp-color">—</div>
            </div>
          </div>
          <div class="vp-result-label" id="vp-opp-result"></div>
        </div>
        <div class="viewer-main">
          <div id="viewer-board-wrap">
            <div id="viewer-board" class="layered-board"></div>
            <svg id="viewer-arrow-svg" class="board-arrow-overlay" viewBox="0 0 800 800" preserveAspectRatio="none"
              xmlns="http://www.w3.org/2000/svg">
              <defs>
                <marker id="viewer-arrow-head" markerUnits="strokeWidth" markerWidth="4" markerHeight="4" refX="2.5"
                  refY="2" orient="auto">
                  <path d="M0,0 L4,2 L0,4 L1,2 Z" fill="rgba(255,165,0,0.92)" stroke="none" />
                </marker>
                <marker id="viewer-arrow-head-seq" markerUnits="strokeWidth" markerWidth="4" markerHeight="4" refX="2.5"
                  refY="2" orient="auto">
                  <path d="M0,0 L4,2 L0,4 L1,2 Z" fill="rgba(80,160,255,0.88)" stroke="none" />
                </marker>
              </defs>
              <g id="viewer-arrow-layer"></g>
            </svg>
          </div>
          <div class="viewer-side">
            <div class="viewer-controls">
              <button class="ctrl-btn" id="btn-first" onclick="goToMove(0)"><svg width="14" height="14"
                  viewBox="0 0 24 24" fill="currentColor">
                  <path d="M6 6H8V18H6ZM9.5 12L18 18V6L9.5 12Z" transform="scale(-1,1) translate(-24,0)" />
                </svg></button>
              <button class="ctrl-btn" id="btn-prev" onclick="goToPrevMove()"><svg width="14" height="14"
                  viewBox="0 0 24 24" fill="currentColor">
                  <path d="M15.5 5L7 12L15.5 19V5Z" />
                </svg></button>
              <div class="ctrl-move-info">
                <div class="ctrl-move-num" id="ctrl-move-num">시작</div>
                <div id="ctrl-move-san" style="font-size:11px;color:var(--text-muted);margin-top:1px;"></div>
              </div>
              <button class="ctrl-btn" id="btn-next" onclick="goToNextMove()"><svg width="14" height="14"
                  viewBox="0 0 24 24" fill="currentColor">
                  <path d="M8.5 5L17 12L8.5 19V5Z" />
                </svg></button>
              <button class="ctrl-btn" id="btn-last" onclick="goToLastMove()"><svg width="14" height="14"
                  viewBox="0 0 24 24" fill="currentColor">
                  <path d="M6 6H8V18H6ZM9.5 12L18 18V6L9.5 12Z" />
                </svg></button>
            </div>
            <div class="viewer-moves">
              <div class="move-tokens" id="move-tokens"></div>
            </div>

            <!-- Lichess 분석 버튼 제거됨 -->
          </div>
        </div>
        <div class="viewer-player-bar" style="max-width:880px;width:100%;border-color:var(--accent-green-dark);">
          <div class="vp-info">
            <div class="vp-avatar me" id="vp-my-avatar">나</div>
            <div>
              <div class="vp-name" id="vp-my-name">나</div>
              <div class="vp-color" id="vp-my-color">—</div>
            </div>
          </div>
          <div class="vp-result-label" id="vp-my-result"></div>
        </div>
      </div>
    </div>
  </div>
  <div id="toast"></div>

  <!-- 전술 상세 모달 -->
  <div id="tactic-modal" onclick="if(event.target===this)closeTacticModal()">
    <div class="tmodal-box">
      <div class="tmodal-head">
        <div class="tmodal-title" id="tmodal-title">전술 상세</div>
        <button class="tmodal-close" onclick="closeTacticModal()">✕</button>
      </div>
      <div class="tmodal-body" id="tmodal-body"></div>
    </div>
  </div>
