    <div id="viewer-panel">
      <div id="viewer-empty">

        <div class="viewer-player-bar" style="max-width:880px;width:100%;">
          <div class="vp-info">

            <div>
              <div class="vp-name" id="vp-opp-name">상대방</div>
              <div class="vp-color" id="vp-opp-color">—</div>
            </div>
          </div>
          <div class="vp-result-label" id="vp-opp-result"></div>
        </div>
        <div class="viewer-main">
          <div id="viewer-board-wrap">
            <div id="viewer-board" class="layered-board"></div>
            <svg id="viewer-arrow-svg" class="board-arrow-overlay" viewBox="0 0 800 800" preserveAspectRatio="none"
              xmlns="http://www.w3.org/2000/svg">
              <defs>
                <marker id="viewer-arrow-head" markerUnits="strokeWidth" markerWidth="4" markerHeight="4" refX="2.5"
                  refY="2" orient="auto">
                  <path d="M0,0 L4,2 L0,4 L1,2 Z" fill="rgba(255,165,0,0.92)" stroke="none" />
                </marker>
                <marker id="viewer-arrow-head-seq" markerUnits="strokeWidth" markerWidth="4" markerHeight="4" refX="2.5"
                  refY="2" orient="auto">
                  <path d="M0,0 L4,2 L0,4 L1,2 Z" fill="rgba(80,160,255,0.88)" stroke="none" />
                </marker>
              </defs>
              <g id="viewer-arrow-layer"></g>
            </svg>
          </div>
          <div class="viewer-side">
            <div class="viewer-controls">
              <button class="ctrl-btn" id="btn-first" onclick="goToMove(0)"><svg width="14" height="14"
                  viewBox="0 0 24 24" fill="currentColor">
                  <path d="M6 6H8V18H6ZM9.5 12L18 18V6L9.5 12Z" transform="scale(-1,1) translate(-24,0)" />
                </svg></button>
              <button class="ctrl-btn" id="btn-prev" onclick="goToMove(_viewIdx-1)"><svg width="14" height="14"
                  viewBox="0 0 24 24" fill="currentColor">
                  <path d="M15.5 5L7 12L15.5 19V5Z" />
                </svg></button>
              <div class="ctrl-move-info">
                <div class="ctrl-move-num" id="ctrl-move-num">시작</div>
                <div id="ctrl-move-san" style="font-size:11px;color:var(--text-muted);margin-top:1px;"></div>
              </div>
              <button class="ctrl-btn" id="btn-next" onclick="goToMove(_viewIdx+1)"><svg width="14" height="14"
                  viewBox="0 0 24 24" fill="currentColor">
                  <path d="M8.5 5L17 12L8.5 19V5Z" />
                </svg></button>
              <button class="ctrl-btn" id="btn-last" onclick="goToMove(_states.length-1)"><svg width="14" height="14"
                  viewBox="0 0 24 24" fill="currentColor">
                  <path d="M6 6H8V18H6ZM9.5 12L18 18V6L9.5 12Z" />
                </svg></button>
            </div>
            <div class="viewer-moves">
              <div class="move-tokens" id="move-tokens"></div>
            </div>

            <!-- Lichess 분석 버튼 제거됨 -->
          </div>
        </div>
        <div class="viewer-player-bar" style="max-width:880px;width:100%;border-color:var(--accent-green-dark);">

            <div class="vp-avatar me" id="vp-my-avatar">나</div>

            </div>
          </div>
          <div class="vp-result-label" id="vp-my-result"></div>
        </div>
