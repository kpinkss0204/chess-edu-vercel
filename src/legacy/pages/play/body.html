<!-- MAIN -->
<div id="main">

  <!-- 로비 -->
  <div id="screen-lobby" style="display:flex;">
    <div class="lobby-header">
      <div class="lobby-icon">♟</div>
      <div class="lobby-title">온라인 대국</div>
      <div class="lobby-sub">랜덤 매칭 · 실시간 대국</div>
    </div>
    <div class="lobby-card">
      <div class="lobby-card-title">시간 설정</div>
      <div class="time-badge">
        <div class="time-badge-icon">⏱</div>
        <div class="time-badge-info">
          <div class="time-badge-main">10분</div>
          <div class="time-badge-sub">증가분 없음 · 래피드</div>
        </div>
      </div>
      <button class="btn-find" onclick="startMatchmaking()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        대국 찾기
      </button>
    </div>
  </div>

  <!-- 매칭 대기 -->
  <div id="screen-searching" style="display:none;flex-direction:column;align-items:center;gap:24px;">
    <div class="search-spinner"></div>
    <div style="text-align:center;">
      <div class="search-title">상대방 찾는 중...</div>
      <div class="search-elapsed" id="search-elapsed">0초 경과</div>
    </div>
    <button class="btn-cancel" onclick="cancelMatchmaking()">취소</button>
  </div>

  <!-- 대국 중 -->
  <div id="screen-playing" style="display:none;flex-direction:column;align-items:center;gap:10px;">

    <!-- 상대방 바 -->
    <div class="player-bar" style="width:100%;">
      <div class="player-info-wrap">
        <div class="p-avatar" id="opp-avatar-el">?</div>
        <div>
          <div class="p-name"  id="opp-name-el">상대방</div>
          <div class="p-color" id="opp-color-el">—</div>
        </div>
      </div>
      <div class="p-timer" id="opp-timer">10:00</div>
    </div>

    <!-- 보드 -->
    <div id="play-board-wrap">
      <div id="play-board"></div>
      <div id="promo-modal"></div>
      <!-- 화살표 SVG 오버레이 -->
      <svg id="play-arrow-svg" class="board-arrow-overlay" viewBox="0 0 800 800" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="play-arrow-head" markerUnits="strokeWidth" markerWidth="4" markerHeight="4" refX="2.5" refY="2" orient="auto">
            <path d="M0,0 L4,2 L0,4 L1,2 Z" fill="rgba(255,165,0,0.92)" stroke="none"/>
          </marker>
        </defs>
        <g id="play-arrow-layer"></g>
      </svg>
    </div>

    <!-- 내 바 -->
    <div class="player-bar my-bar" style="width:100%;">
      <div class="player-info-wrap">
        <div class="p-avatar me" id="my-avatar-el">?</div>
        <div>
          <div class="p-name"  id="my-name-el">나</div>
          <div class="p-color" id="my-color-el">—</div>
        </div>
      </div>
      <div class="p-timer active" id="my-timer">10:00</div>
    </div>

    <div class="play-actions">
      <button class="btn-draw" id="btn-draw" onclick="offerDraw()">½ 무승부 제안</button>
      <button class="btn-resign" onclick="resignGame()">⚑ 기권</button>
    </div>

  </div>

  <!-- 무승부 제안 수신 바 -->
  <div id="draw-offer-bar">
    <div>상대방이 무승부를 제안했습니다</div>
    <div class="draw-offer-btns">
      <button class="draw-accept-btn" onclick="acceptDraw()">수락</button>
      <button class="draw-decline-btn" onclick="declineDraw()">거절</button>
    </div>
  </div>

  <!-- 결과 -->
  <div id="screen-result" style="display:none;flex-direction:column;align-items:center;">
    <div class="result-card">
      <div class="result-emoji" id="result-emoji">🏆</div>
      <div class="result-title" id="result-title">승리!</div>
      <div class="result-reason" id="result-reason">체크메이트</div>
      <div class="result-players">
        <span id="result-white">백</span>
        <span class="result-vs">vs</span>
        <span id="result-black">흑</span>
      </div>
      <button class="btn-again" onclick="showScreen('lobby')">다시 찾기</button>
      <a class="btn-analysis" href="/">분석 보드로 이동</a>
    </div>
  </div>

</div>

<div id="toast"></div>

<button type="button" class="theme-fab-play" title="테마 변경" aria-label="테마 변경" onclick="toggleColorMode()">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20 8.69V4H15.31L12 0.69L8.69 4H4V8.69L0.69 12L4 15.31V20H8.69L12 23.31L15.31 20H20V15.31L23.31 12L20 8.69ZM12 18C8.69 18 6 15.31 6 12C6 8.69 8.69 6 12 6C15.31 6 18 8.69 18 12C18 15.31 15.31 18 12 18Z"/></svg>
</button>
