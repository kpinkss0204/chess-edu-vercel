<!-- MAIN -->
<div id="main">
  <!-- LEFT: BOARD -->
  <div id="board-area">
    <div id="chessboard"></div>
    <div id="board-controls">
      <button class="ctrl-btn" id="btn-start" title="처음으로" onclick="goToStart()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-prev" title="이전 수" onclick="goBack()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-next" title="다음 수" onclick="goForward()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-end" title="마지막으로" onclick="goToEnd()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
      <span class="ctrl-spacer"></span>
      <button class="ctrl-btn" id="flip-btn" title="보드 뒤집기" onclick="flipBoard()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M16 17.01V10h-2v7.01h-3L15 21l4-3.99h-3zM9 3L5 6.99h3V14h2V6.99h3L9 3z"/></svg>
      </button>
      <button class="ctrl-btn" title="초기화" onclick="resetBoard()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      </button>
    </div>
    <div id="pgn-input-row">
      <textarea id="pgn-input" rows="2" placeholder="PGN 붙여넣기 (예: 1.e4 e5 2.Nf3 ...)"></textarea>
      <button id="pgn-load-btn" onclick="loadPGN()">불러오기</button>
    </div>
  </div>

  <!-- RIGHT: EXPLORER PANEL -->
  <div id="right-panel">
    <!-- Opening name -->
    <div id="opening-header">
      <div id="opening-name">시작 포지션</div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
        <span id="opening-eco" style="display:none"></span>
        <span id="opening-moves-display" style="font-size:11px;color:var(--text-muted);font-family:monospace;"></span>
      </div>
    </div>

    <!-- Move history breadcrumb -->
    <div id="move-history-bar">
      <span style="font-size:10px;color:var(--text-muted);margin-right:4px;">♟</span>
    </div>
<!-- DB filter -->
    <div id="db-filter">
      <div class="filter-group">
        <span class="filter-label">DB</span>
        <div class="tab-pill-group">
          <button class="tab-pill active" data-db="masters" onclick="setDb('masters',this)">마스터</button>
          <button class="tab-pill" data-db="lichess" onclick="setDb('lichess',this)">리체스</button>
        </div>
      </div>
      <div class="filter-group" id="rating-filter" style="display:none;">
        <span class="filter-label">레이팅</span>
        <select class="filter-select" id="rating-select" onchange="onFilterChange()">
          <option value="all"  selected>전체</option>
          <option value="1200">~1200</option>
          <option value="1400">1200-1400</option>
          <option value="1600">1400-1600</option>
          <option value="1800">1600-1800</option>
          <option value="2000">1800-2000</option>
          <option value="2200">2000-2200</option>
          <option value="2500">2200-2500</option>
          <option value="2500+">2500+</option>
        </select>
      </div>
      <div class="filter-group" id="speed-filter" style="display:none;">
        <span class="filter-label">시간제</span>
        <select class="filter-select" id="speed-select" onchange="onFilterChange()">
          <option value="" selected>전체</option>
          <option value="bullet">Bullet</option>
          <option value="blitz">Blitz</option>
          <option value="rapid">Rapid</option>
          <option value="classical">Classical</option>
        </select>
      </div>
    </div>

    <!-- Stats bar -->
    <div id="stats-bar">
      <div class="stat-result-bar">
        <div class="stat-white" id="stat-white-bar" style="width:33%"></div>
        <div class="stat-draw"  id="stat-draw-bar"  style="width:34%"></div>
        <div class="stat-black" id="stat-black-bar" style="width:33%"></div>
      </div>
      <div class="stat-pct-row">
        <div class="stat-pct-item">
          <div class="stat-dot white"></div>
          <span class="stat-pct-val" id="stat-white-pct">—</span>
          <span class="stat-pct-label">백</span>
        </div>
        <div class="stat-pct-item">
          <div class="stat-dot draw"></div>
          <span class="stat-pct-val" id="stat-draw-pct">—</span>
          <span class="stat-pct-label">무</span>
        </div>
        <div class="stat-pct-item">
          <div class="stat-dot black"></div>
          <span class="stat-pct-val" id="stat-black-pct">—</span>
          <span class="stat-pct-label">흑</span>
        </div>
      </div>
      <div class="stat-total" id="stat-total">— 게임</div>
    </div>

    <!-- Loading -->
    <div id="explorer-loading">
      <div class="loading-spinner-sm"></div>
      <span>데이터 불러오는 중...</span>
    </div>

    <!-- Moves table header -->
    <div id="moves-table-header">
      <span>수</span>
      <span>승/무/패</span>
      <span style="text-align:right">게임수</span>
      <span style="text-align:right">백 승%</span>
      <span style="text-align:right">평균 Elo</span>
    </div>

    <!-- Moves list -->
    <div id="moves-area">
      <div class="moves-list" id="moves-list"></div>
      <div id="no-data-msg" class="no-data-msg" style="display:none">이 포지션에 대한 데이터가 없습니다.</div>
    </div>

    <!-- Top games -->
    <div id="top-games-section">
      <div class="top-games-header">대표 게임</div>
      <div id="top-games-list"></div>
    </div>

    <!-- Status -->
    <div id="status-bar">
      <span class="status-dot-sm"></span>
      <span id="status-text">Lichess 오프닝 탐색기</span>
      <span style="flex:1"></span>
      <span id="fen-display" style="font-size:10px;color:var(--text-muted);font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:280px;"></span>
    </div>
  </div>
</div>
