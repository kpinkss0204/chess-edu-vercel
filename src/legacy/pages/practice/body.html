<nav id="sidebar"></nav>

<!-- ── 엔진 로딩 오버레이 ── -->
<div id="engine-loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">
    Stockfish 18 로딩 중…
    <br><small style="opacity:0.55; font-size:11px; margin-top:4px; display:block">첫 로드 시 잠시 기다려 주세요</small>
  </div>
</div>

<!-- ── 모바일: 우측 패널 백드롭 ── -->
<div id="mobile-panel-backdrop" onclick="closeMobilePanel()"></div>

<!-- ── 모바일: 패널 열기 FAB ── -->
<button id="mobile-panel-toggle" onclick="toggleMobilePanel()" title="설정 / 기보 열기" aria-label="패널 열기">
  ⚙
</button>

<!-- ════════════════════ MAIN ════════════════════ -->
<div id="main">

  <!-- ─── 보드 영역 ─── -->
  <div id="board-area">

    <!-- 흑 플레이어 -->
    <div class="player-info" id="player-black">
      <div class="player-avatar" id="avatar-black">
        <img src="https://lichess1.org/assets/piece/cburnett/bP.svg" alt="흑">
      </div>
      <div class="player-details">
        <span class="player-name" id="name-black">Stockfish (Engine)</span>
        <span class="player-rating" id="rating-black">Lv.20</span>
        <div class="captured-pieces" id="captured-black"></div>
      </div>
      <div class="player-clock" id="clock-black">∞</div>
    </div>

    <!-- 평가바 + 체스보드 -->
    <div id="eval-container">
      <div id="eval-bar-wrap">
        <div id="eval-bar-black"></div>
        <div id="eval-bar-fill" style="height:50%"></div>
        <span id="eval-score-black">0.0</span>
        <span id="eval-score-white">0.0</span>
      </div>

      <div id="board-wrap">
        <div id="chessboard"></div>
        <svg id="board-svg-overlay" viewBox="0 0 800 800" preserveAspectRatio="none"
          xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arr-threat" markerUnits="strokeWidth" markerWidth="4" markerHeight="4" refX="2.5" refY="2" orient="auto">
              <path d="M0,0 L4,2 L0,4 L1,2 Z" fill="rgba(220,55,55,0.95)" stroke="none"/>
            </marker>
            <marker id="arr-best" markerUnits="strokeWidth" markerWidth="4" markerHeight="4" refX="2.5" refY="2" orient="auto">
              <path d="M0,0 L4,2 L0,4 L1,2 Z" fill="rgba(70,130,200,0.95)" stroke="none"/>
            </marker>
          </defs>
          <g id="svg-highlights"></g>
          <g id="svg-arrows"></g>
        </svg>
      </div>
    </div>

    <!-- 백 플레이어 -->
    <div class="player-info" id="player-white">
      <div class="player-avatar" id="avatar-white">
        <img src="https://lichess1.org/assets/piece/cburnett/wP.svg" alt="백">
      </div>
      <div class="player-details">
        <span class="player-name" id="name-white">나 (You)</span>
        <span class="player-rating" id="rating-white">?</span>
        <div class="captured-pieces" id="captured-white"></div>
      </div>
      <div class="player-clock active" id="clock-white">∞</div>
    </div>

    <!-- 보드 컨트롤 바 -->
    <div id="board-controls">
      <button class="ctrl-btn" onclick="game.prevMove()" title="이전 수">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 19L7 12L15.5 5V19Z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="game.nextMove()" title="다음 수">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8.5 5L17 12L8.5 19V5Z"/></svg>
      </button>
      <div class="ctrl-divider"></div>
      <div class="eval-score" id="eval-score" title="엔진 평가">0.0</div>
      <div class="ctrl-divider"></div>
      <button id="edit-mode-btn" class="overlay-ctrl-btn" onclick="palToggle()" title="기물 편집 모드">
        🎨 편집
      </button>
      <button class="ctrl-btn" onclick="game.flipBoard()" title="보드 뒤집기" style="margin-left:auto">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="17 1 21 5 17 9"/>
          <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/>
          <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
      </button>
      <button class="ctrl-btn" onclick="practiceNewGame()" title="새 게임">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
        </svg>
      </button>
    </div>

    <!-- 기물 편집 팔레트 (보드 영역 아래, 데스크탑 대응) -->
    <div id="palette-panel" style="display:none; margin-top: 12px;">
      <div class="palette-row">
        <div class="pal-group">
          <div id="pal-w"></div>
        </div>
        <div class="pal-group">
          <div id="pal-b"></div>
        </div>
      </div>
      <div class="palette-actions">
        <div class="pal-turn-row">
          <button class="pal-turn-btn" id="pal-tw" onclick="palTurn('w')">⬜ 백</button>
          <button class="pal-turn-btn" id="pal-tb" onclick="palTurn('b')">⬛ 흑</button>
        </div>
        <button class="pal-action-btn delete" id="pal-erase" onclick="palErase()" title="삭제">🗑 삭제</button>
        <button class="pal-action-btn clear" onclick="palClear()" title="초기화">🧹 초기화</button>
        <button class="pal-action-btn done" onclick="palToggle()">✔ 완료</button>
      </div>
    </div>

  </div><!-- /#board-area -->


  <!-- ─── 우측 패널 ─── -->
  <div id="right-panel">

    <!-- 탭 헤더 -->
    <div id="panel-tabs">
      <button class="tab-btn active" onclick="switchTab('config')">⚙ 설정</button>
      <button class="tab-btn" onclick="switchTab('moves')">📋 기보</button>
    </div>

    <!-- 설정 탭 -->
    <div class="tab-panel active" id="tab-config">
      <div id="config-panel">

        <!-- 대전 설정 -->
        <div class="config-section">
          <div class="config-title">대전 설정</div>
          <div class="setting-row">
            <label>모드</label>
            <div class="mode-pills">
              <button class="mode-pill active" id="mode-casual" onclick="setMode('casual')">캐주얼</button>
              <button class="mode-pill" id="mode-level" onclick="setMode('level')">레벨전</button>
            </div>
          </div>
          <div class="setting-row" id="level-row" style="display:none;">
            <label>엔진 레벨</label>
            <select id="engine-level" onchange="setEngineLevel(this.value)">
              <option value="1">Level 1</option>
              <option value="5">Level 5</option>
              <option value="10">Level 10</option>
              <option value="20" selected>Level 20</option>
            </select>
          </div>
        </div>

        <!-- 포지션 입력 -->
        <div class="config-section">
          <div class="config-title">포지션 입력</div>
          <div id="pgn-input-row" style="display:flex; flex-direction:column; gap:8px;">
            <textarea id="fen-input" rows="3" placeholder="FEN 또는 PGN을 여기에 붙여넣기…"></textarea>
            <button class="btn-primary" onclick="loadPositionFromInput()">▶ 적용하기</button>
            <button class="btn-secondary" onclick="saveCurrentGame()">✨ 기보 저장</button>
          </div>
        </div>

        <!-- 힌트 패널 (숨김 기본) -->
        <div id="hint-panel">
          <div id="hint-content"></div>
        </div>

      </div>
    </div>

    <!-- 기보 탭 -->
    <div class="tab-panel" id="tab-moves">
      <div id="moves-panel">
        <div id="move-list"></div>
      </div>
    </div>

    <!-- 상태 바 -->
    <div id="status-bar">
      <div class="status-indicator">
        <div class="status-dot"></div>
        <span id="status-text">준비 완료</span>
      </div>
      <span class="depth-info" id="depth-info" style="margin-left:auto; opacity:0.7;"></span>
      <span style="opacity:0.3">|</span>
      <span id="move-count-bar" style="font-family: var(--font-mono, monospace)">0 수</span>
    </div>

  </div><!-- /#right-panel -->

</div><!-- /#main -->

<!-- 프로모션 모달 -->
<div id="promotion-modal">
  <div class="promotion-box">
    <div class="promotion-title">프로모션 기물 선택</div>
    <div class="promotion-pieces" id="promo-pieces"></div>
  </div>
</div>

<!-- 접근성용 게임 정보 -->
<div class="sr-only-gameinfo" aria-hidden="true">
  <span id="info-white">-</span>
  <span id="info-black">-</span>
  <span id="info-date">-</span>
  <span id="info-result">*</span>
  <span id="info-opening">-</span>
</div>

<!-- 모바일 하단 내비게이션 -->
<nav id="mobile-bottom-nav"></nav>

<!-- 토스트 알림 -->
<div id="toast"></div>

<script>
/* ── 모바일 패널 드로어 제어 ── */
function toggleMobilePanel() {
  var panel = document.getElementById('right-panel');
  var btn   = document.getElementById('mobile-panel-toggle');
  var bd    = document.getElementById('mobile-panel-backdrop');
  var isOpen = panel.classList.contains('mobile-open');
  if (isOpen) {
    panel.classList.remove('mobile-open');
    btn.classList.remove('panel-open');
    bd.classList.remove('show');
    btn.textContent = '⚙';
  } else {
    panel.classList.add('mobile-open');
    btn.classList.add('panel-open');
    bd.classList.add('show');
    btn.textContent = '✕';
  }
}

function closeMobilePanel() {
  var panel = document.getElementById('right-panel');
  var btn   = document.getElementById('mobile-panel-toggle');
  var bd    = document.getElementById('mobile-panel-backdrop');
  panel.classList.remove('mobile-open');
  btn.classList.remove('panel-open');
  bd.classList.remove('show');
  btn.textContent = '⚙';
}

/* 기보 탭으로 전환 시 모바일에서 자동 오픈 */
var _origSwitchTab = window.switchTab;
window.switchTab = function(tab) {
  if (_origSwitchTab) _origSwitchTab(tab);
  if (window.innerWidth <= 768) {
    var panel = document.getElementById('right-panel');
    if (!panel.classList.contains('mobile-open')) {
      toggleMobilePanel();
    }
  }
};
</script>
