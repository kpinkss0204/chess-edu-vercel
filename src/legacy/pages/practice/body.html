<nav id="sidebar"></nav>

<!-- Engine Loading Overlay -->
<div id="engine-loading">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">Stockfish 18 WASM 로딩 중...<br><small style="opacity:0.6;font-size:12px">처음 로드 시 잠시 시간이 걸립니다</small></div>
</div>

<div id="main">
  <!-- Board Area -->
  <div id="board-area">
    <!-- Black Player -->
    <div class="player-info" id="player-black">
      <div class="player-avatar" id="avatar-black">
        <img src="https://lichess1.org/assets/piece/cburnett/bP.svg" alt="흑">
      </div>
      <div class="player-details">
        <span class="player-name" id="name-black">흑 (Black)</span>
        <span class="player-rating" id="rating-black">Lv.20</span>
        <div class="captured-pieces" id="captured-black"></div>
      </div>
    </div>

    <!-- Eval Bar + Board -->
    <div id="eval-container">
      <div id="eval-bar-wrap">
        <div id="eval-bar-black"></div>
        <div id="eval-bar-fill" style="height:50%"></div>
        <span id="eval-score-black">0.0</span>
        <span id="eval-score-white">0.0</span>
      </div>
      <div id="board-wrap">
        <div id="chessboard"></div>
        <svg id="board-svg-overlay" viewBox="0 0 800 800" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arr-threat" markerUnits="strokeWidth" markerWidth="4" markerHeight="4" refX="2.5" refY="2" orient="auto">
              <path d="M0,0 L4,2 L0,4 L1,2 Z" fill="rgba(220,55,55,0.95)" stroke="none" />
            </marker>
            <marker id="arr-best" markerUnits="strokeWidth" markerWidth="4" markerHeight="4" refX="2.5" refY="2" orient="auto">
              <path d="M0,0 L4,2 L0,4 L1,2 Z" fill="rgba(70,130,200,0.95)" stroke="none" />
            </marker>
          </defs>
          <g id="svg-highlights"></g>
          <g id="svg-arrows"></g>
        </svg>
      </div>
    </div>

    <!-- White Player -->
    <div class="player-info" id="player-white">
      <div class="player-avatar" id="avatar-white">
        <img src="https://lichess1.org/assets/piece/cburnett/wP.svg" alt="백">
      </div>
      <div class="player-details">
        <span class="player-name" id="name-white">백 (White)</span>
        <span class="player-rating" id="rating-white">?</span>
        <div class="captured-pieces" id="captured-white"></div>
      </div>
    </div>

    <!-- Board Controls -->
    <div id="board-controls">
      <button class="ctrl-btn" onclick="game.prevMove()" title="이전 수">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 19L7 12L15.5 5V19Z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="game.nextMove()" title="다음 수">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8.5 5L17 12L8.5 19V5Z"/></svg>
      </button>
      <div class="ctrl-divider"></div>
      <div class="eval-score" id="eval-score" title="엔진 평가">0.0</div>
      <div class="ctrl-divider"></div>
      <button id="edit-mode-btn" class="overlay-ctrl-btn" onclick="palToggle()" title="기물 편집 모드">
        🎨 편집
      </button>
      <button id="hint-toggle-btn" class="overlay-ctrl-btn" onclick="toggleHintPanel()" title="힌트 보기">
        💡 힌트
      </button>
      <button class="ctrl-btn" onclick="game.flipBoard()" title="보드 뒤집기" style="margin-left:auto">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="17 1 21 5 17 9" />
          <path d="M3 11V9a4 4 0 0 1 4-4h14" />
          <polyline points="7 23 3 19 7 15" />
          <path d="M21 13v2a4 4 0 0 1-4 4H3" />
        </svg>
      </button>
      <button class="ctrl-btn" onclick="practiceNewGame()" title="새 게임">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z" />
        </svg>
      </button>
    </div>
  </div><!-- /#board-area -->

  <!-- Right Panel -->
  <div id="right-panel">
    <!-- Panel Tabs -->
    <div id="panel-tabs">
      <button class="tab-btn active" onclick="switchTab('config')">⚙ 설정</button>
      <button class="tab-btn" onclick="switchTab('moves')">📋 기보</button>
      <button class="tab-btn" onclick="switchTab('palette')">🎨 편집</button>
    </div>

    <!-- Config Tab -->
    <div class="tab-panel active" id="tab-config">
      <div id="config-panel">
        <!-- Position Input -->
        <div class="config-section">
          <div class="config-title">포지션 입력</div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            <textarea id="fen-input" rows="3" placeholder="FEN 또는 PGN을 여기에 붙여넣기..."></textarea>
            <button class="btn-primary" onclick="loadPositionFromInput()">▶ 적용하기</button>
            <button class="btn-secondary" onclick="saveCurrentGame()">✨ 기보 저장</button>
          </div>
        </div>

        <!-- Hint Panel -->
        <div id="hint-panel" style="display:none;">
          <div class="config-title">힌트</div>
          <div id="hint-content" style="font-size:13px; color:var(--text-secondary); line-height:1.5;"></div>
        </div>
      </div>
    </div>

    <!-- Moves Tab -->
    <div class="tab-panel" id="tab-moves">
      <div id="moves-panel">
        <div class="move-list-header">
          <span class="move-list-title">기보</span>
          <span class="move-count" id="move-count">0 수</span>
        </div>
        <div id="move-list"></div>
      </div>
    </div>

    <!-- Piece Palette Tab -->
    <div class="tab-panel" id="tab-palette">
      <div id="palette-content">
        <!-- Engine Limitation Notice -->
        <div style="margin-bottom:12px; padding:10px; background:rgba(80,144,208,0.1); border:1px solid rgba(80,144,208,0.3); border-radius:8px; font-size:12px; line-height:1.4; color:var(--text-secondary);">
          💡 <b>엔진 분석 안내</b><br>
          한 사이드당 기물은 최대 16개까지 분석 가능하며, 양측 킹이 반드시 하나씩 존재해야 분석이 시작됩니다.
        </div>
        <div class="palette-row">
          <div class="pal-group">
            <div id="pal-w"></div>
          </div>
          <div class="pal-group">
            <div id="pal-b"></div>
          </div>
        </div>
        <div class="palette-actions">
          <div class="pal-turn-row">
            <button class="pal-turn-btn" id="pal-tw" onclick="palTurn('w')">⬜ 백</button>
            <button class="pal-turn-btn" id="pal-tb" onclick="palTurn('b')">⬛ 흑</button>
          </div>
          <div style="display: flex; flex-direction: column; gap: 8px; width: 100%;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
              <button class="pal-action-btn delete" id="pal-erase" onclick="palErase()" title="삭제">🗑 삭제</button>
              <button class="pal-action-btn" onclick="palReset()" title="기본 배치">♟ 시작 포지션</button>
              <button class="pal-action-btn clear" onclick="palClear()" title="전체 삭제">🧹 보드 비우기</button>
              <button class="pal-action-btn" onclick="toggleMobilePanel(false)" id="btn-minimize-pal" style="display:none;">📱 보드 보기</button>
            </div>
            <button class="pal-action-btn done" onclick="palToggle()" style="width:100%; height: 44px; font-size: 15px; margin-top: 4px;">✔ 편집 완료</button>
          </div>
        </div>
        <!-- Warning Message -->
        <div id="pos-warn-msg" style="display:none; margin-top:12px; padding:10px; background:rgba(255,165,0,0.1); border:1px solid rgba(255,165,0,0.3); border-radius:8px; color:#ffcc00; font-size:12px; line-height:1.4;"></div>
      </div>
    </div>

    <!-- Status Bar -->
    <div id="status-bar">
      <div class="status-indicator">
        <div class="status-dot"></div>
        <span id="status-text">준비 완료</span>
      </div>
      <span class="depth-info" id="depth-info" style="margin-left:auto; opacity:0.7;"></span>
      <span style="opacity:0.3; margin: 0 8px;">|</span>
      <span id="move-count-bar">0 수</span>
    </div>
  </div><!-- /#right-panel -->
</div><!-- /#main -->

<!-- Promotion Modal -->
<div id="promotion-modal">
  <div class="promotion-box">
    <div class="promotion-title">프로모션 기물 선택</div>
    <div class="promotion-pieces" id="promo-pieces"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Mobile Drawer Backdrop -->
<div id="mobile-panel-backdrop" onclick="closeMobilePanel()"></div>

<!-- Mobile Panel Toggle FAB -->
<button id="mobile-panel-toggle" onclick="toggleMobilePanel()" aria-label="패널 열기">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="3" y1="12" x2="21" y2="12"></line>
    <line x1="3" y1="6" x2="21" y2="6"></line>
    <line x1="3" y1="18" x2="21" y2="18"></line>
  </svg>
</button>
