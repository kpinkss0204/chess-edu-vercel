<div id="engine-loading">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">Stockfish 18 WASM 로딩 중...<br><small style="opacity:0.6;font-size:12px">처음 로드 시 잠시 시간이 걸립니다</small></div>
</div>

<div id="main">
  <!-- ★ 기물 팔레트 패널 (보드 왼쪽) -->
  <div id="palette-panel">
    <div class="pal-label">백</div>
    <div id="pal-w"></div>
    <div class="pal-div"></div>
    <div class="pal-label">흑</div>
    <div id="pal-b"></div>
    <div class="pal-div"></div>
    <div class="pal-erase" id="pal-erase" title="우클릭도 삭제" onclick="palErase()">🗑</div>
    <div class="pal-div"></div>
    <div class="pal-label">차례</div>
    <div class="pal-turn-row">
      <div class="pal-turn-btn" id="pal-tw" onclick="palTurn('w')">백</div>
      <div class="pal-turn-btn" id="pal-tb" onclick="palTurn('b')">흑</div>
    </div>
    <div class="pal-div"></div>
    <div class="pal-btn pal-clear" onclick="palClear()" title="전체 삭제">전체<br>삭제</div>
    <div class="pal-btn pal-reset" onclick="palReset()" title="초기 배치">초기<br>배치</div>
  </div>
  <div id="board-area">
    <div class="player-info" id="player-black">
      <div class="player-avatar" id="avatar-black">
        <img src="https://lichess1.org/assets/piece/cburnett/bP.svg" alt="흑">
      </div>
      <div class="player-details">
        <span class="player-name" id="name-black">흑</span>
        <span class="player-rating" id="rating-black">?</span>
        <div class="captured-pieces" id="captured-black"></div>
      </div>
      <div class="player-clock" id="clock-black">∞</div>
    </div>

    <div id="eval-container">
      <div id="eval-bar-wrap">
        <div id="eval-bar-black"></div>
        <div id="eval-bar-fill" style="height:50%"></div>
        <span id="eval-score-black">0.0</span>
        <span id="eval-score-white">0.0</span>
      </div>
      <div id="board-wrap">
        <div id="chessboard"></div>
      </div>
    </div>

    <div class="player-info" id="player-white">
      <div class="player-avatar" id="avatar-white">
        <img src="https://lichess1.org/assets/piece/cburnett/wP.svg" alt="백">
      </div>
      <div class="player-details">
        <span class="player-name" id="name-white">백</span>
        <span class="player-rating" id="rating-white">?</span>
        <div class="captured-pieces" id="captured-white"></div>
      </div>
      <div class="player-clock" id="clock-white">∞</div>
    </div>

    <div id="board-controls">
      <button class="ctrl-btn" onclick="game.goToStart()" title="처음">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6H8V18H6ZM9.5 12L18 18V6L9.5 12Z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="game.prevMove()" title="이전">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 19L7 12L15.5 5V19Z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="game.nextMove()" title="다음">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8.5 5L17 12L8.5 19V5Z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="game.goToEnd()" title="끝">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18 18H16V6H18ZM14.5 12L6 6V18L14.5 12Z"/></svg>
      </button>
      <div class="ctrl-spacer"></div>
      <div class="eval-score" id="eval-score" title="엔진 평가">0.0</div>
      <button class="ctrl-btn" onclick="game.flipBoard()" title="보드 뒤집기">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
      <button class="ctrl-btn" onclick="practiceNewGame()" title="같은 조건으로 새 게임">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      </button>
      <button class="ctrl-btn" id="edit-mode-btn" onclick="palToggle()" title="기물 편집 모드" style="border-color:rgba(80,144,208,0.4);color:#7eb8e8;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      </button>
    </div>
  </div>

  <div id="right-panel">
    <div class="practice-panel-header">
      <h2>포지션 편집</h2>
      <p>FEN/PGN을 입력하거나 기물을 배치하여 원하는 포지션을 만드세요.</p>

      <div style="margin-top: 10px;">
        <input type="text" id="fen-input" placeholder="FEN 또는 PGN 입력" style="width:100%; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-primary); font-size: 12px; margin-bottom: 6px;">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px;">
          <button type="button" class="btn-newgame" style="margin-top:0; background:var(--bg-tertiary); border:1px solid var(--border); color:var(--text-secondary);" onclick="copyCurrentFen()">FEN 복사</button>
          <button type="button" class="btn-newgame" style="margin-top:0; background:var(--bg-tertiary); border:1px solid var(--border); color:var(--text-secondary);" onclick="copyCurrentPgn()">PGN 복사</button>
        </div>
        <button type="button" class="btn-newgame" id="load-pos-btn" onclick="loadPositionFromInput()" style="margin-top:0; margin-bottom:6px;">포지션 불러오기</button>
        <button type="button" class="btn-newgame" style="margin-top:0; background:var(--accent-blue); color:#fff;" onclick="saveCurrentGame()">✨ 현재 기보 저장하기</button>
      </div>



      <!-- 기물 편집 패널 -->
      <div id="piece-editor-bar" style="display:block; margin-top: 15px;">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap; margin-bottom: 8px;">
          <span class="editor-label" style="margin-bottom:0;">✏️ 기물 편집</span>
          <span style="font-size:10px;color:var(--text-muted);">클릭: 배치 | 우클릭: 삭제</span>
        </div>
        <div>
          <div class="editor-label" style="margin-bottom:4px; font-size: 9px;">백 기물</div>
          <div class="editor-piece-palette" id="palette-white"></div>
        </div>
        <div style="margin-top: 8px;">
          <div class="editor-label" style="margin-bottom:4px; font-size: 9px;">흑 기물</div>
          <div class="editor-piece-palette" id="palette-black"></div>
        </div>
        <div class="editor-turn-row" style="margin-top: 10px;">
          <span>차례:</span>
          <button class="editor-turn-btn" id="turn-btn-w" onclick="setEditorTurn('w')">⬜ 백</button>
          <button class="editor-turn-btn" id="turn-btn-b" onclick="setEditorTurn('b')">⬛ 흑</button>
          <div class="palette-erase" id="erase-btn" onclick="selectEraseMode()" title="기물 삭제">🗑</div>
        </div>
      </div>
    </div><!-- /practice-panel-header -->

    <div id="analysis-panel">
      <div class="analysis-header">
        <div style="display:flex; flex-direction:column; gap:2px;">
          <div class="engine-badge">
            <div class="engine-dot idle" id="engine-dot"></div>
            <span id="engine-name">Stockfish 18</span>
          </div>
          <div id="pos-warn-msg" style="display:none; color:#ff6b6b; font-size:10px; font-weight:700; white-space:nowrap;">⚠️ 엔진 제한 초과</div>
        </div>
        <span class="depth-info" id="depth-info">준비 중</span>
      </div>

      <div id="top-moves" class="top-moves practice-hide-top-moves">
        <div id="top-moves-empty"></div>
      </div>

      <div id="threat-panel" style="display:none;"></div>
      <div id="threat-content" style="display:none;"></div>
      <div id="best-explain-panel" style="display:none;"></div>
      <div id="best-explain-content" style="display:none;"></div>
      <div id="best-explain-seq" style="display:none;"></div>

      <div id="move-list-wrap">
        <div class="move-list-header">
          <span class="move-list-title">기보</span>
          <span class="move-count" id="move-count">0 수</span>
        </div>
        <div id="move-list"></div>
      </div>
    </div>

    <div id="status-bar">
      <div class="status-indicator">
        <div class="status-dot"></div>
        <span id="status-text">백의 차례</span>
      </div>
      <span>|</span>
      <span id="move-count-bar">0 수</span>
    </div>
  </div>
</div>

<div id="promotion-modal">
  <div class="promotion-box">
    <div class="promotion-title">프로모션 기물 선택</div>
    <div class="promotion-pieces" id="promo-pieces"></div>
  </div>
</div>

<div class="sr-only-gameinfo" aria-hidden="true">
  <span id="info-white">-</span>
  <span id="info-black">-</span>
  <span id="info-date">-</span>
  <span id="info-result">*</span>
  <span id="info-opening">-</span>
</div>

<div id="toast"></div>
